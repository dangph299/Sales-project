name: sales-management
services:
  postgres:
    image: postgres:17-alpine
    mem_limit: 768m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./seed/postgres-init.sql:/docker-entrypoint-initdb.d/01-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    mem_limit: 256m
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:8
    mem_limit: 768m
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka:
    image: apache/kafka:4.1.1
    ports: ["9094:9094"]
    mem_limit: 768m
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:9092,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Topics are provisioned explicitly by kafka-init with a known partition count; do not let a
      # consumer/producer auto-create a topic with the wrong partitioning and break aggregate ordering.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  kafka-init:
    image: apache/kafka:4.1.1
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
      KAFKA_TOPIC_PARTITIONS: 3
      KAFKA_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TOPICS_SOURCE: /opt/kafka-init/KafkaTopics.cs
    volumes:
      - ./kafka-init-topics.sh:/opt/kafka-init/kafka-init-topics.sh:ro
      - ../src/Shared/BuildingBlocks.Contracts/Messaging/KafkaTopics.cs:/opt/kafka-init/KafkaTopics.cs:ro
    entrypoint: ["/bin/bash", "/opt/kafka-init/kafka-init-topics.sh"]

  seq:
    image: datalust/seq:2025.2
    mem_limit: 512m
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports: ["5341:5341", "8081:80"]
    volumes: ["seq-data:/data"]

  elasticsearch:
    mem_limit: 1g
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports: ["9200:9200"]
    volumes: ["elastic-data:/usr/share/elasticsearch/data"]

  kibana:
    mem_limit: 2g
    image: docker.elastic.co/kibana/kibana:9.1.0
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports: ["5601:5601"]
    depends_on: [elasticsearch]

  apm-server:
    mem_limit: 512m
    image: docker.elastic.co/apm/apm-server:9.1.0
    command: ["--strict.perms=false", "-e", "-c", "/usr/share/apm-server/apm-server.yml"]
    volumes: ["./apm-server.yml:/usr/share/apm-server/apm-server.yml:ro"]
    ports: ["8200:8200"]
    depends_on: [elasticsearch, kibana]

  otel-collector:
    mem_limit: 256m
    image: otel/opentelemetry-collector-contrib:0.135.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes: ["./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro"]
    ports: ["4317:4317", "4318:4318"]
    depends_on: [apm-server]

  # One-shot: imports the Sales/Inventory Kibana dashboard once Kibana is available.
  # The script polls Kibana's status API, so it tolerates Kibana still starting up.
  # Idempotent (overwrite=true); safe to leave in the stack across restarts.
  kibana-init:
    image: curlimages/curl:8.11.0
    depends_on: [kibana, apm-server]
    environment:
      KIBANA_URL: http://kibana:5601
    volumes:
      - ./kibana:/opt/kibana-init:ro
    entrypoint: ["sh", "/opt/kibana-init/import-dashboards.sh"]
    restart: "no"

  sales-api:
    mem_limit: 512m
    build:
      context: ..
      dockerfile: src/Services/Sales/Sales.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Outbox__PollIntervalMilliseconds: 1000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: sales-api
    ports: ["5000:8080"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  inventory-api:
    mem_limit: 512m
    build:
      context: ..
      dockerfile: src/Services/Inventory/Inventory.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Outbox__PollIntervalMilliseconds: 1000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: inventory-api
    ports: ["5001:8080"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  dashboard-bff:
    mem_limit: 512m
    build:
      context: ..
      dockerfile: src/Services/Dashboard/Dashboard.Bff/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Redis: redis:6379
      ConnectionStrings__Hangfire: Host=postgres;Database=dashboard;Username=postgres;Password=postgres
      Downstream__SalesBaseUrl: http://sales-api:8080
      Downstream__InventoryBaseUrl: http://inventory-api:8080
      ServiceAccount__AllowAdminDevFallback: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: dashboard-bff
    ports: ["5002:8080"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      sales-api: { condition: service_healthy }
      inventory-api: { condition: service_healthy }

  audit-worker:
    mem_limit: 512m
    build:
      context: ..
      dockerfile: src/Services/AuditLog/AuditLog.Worker/Dockerfile
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: audit-worker
    restart: unless-stopped
    depends_on:
      mongo: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

volumes:
  postgres-data:
  mongo-data:
  seq-data:
  elastic-data:
