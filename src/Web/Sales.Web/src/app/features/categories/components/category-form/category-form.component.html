<nz-alert *ngIf="errorMessage" class="notice" nzType="error" [nzMessage]="errorMessage" nzShowIcon></nz-alert>
<nz-alert
  *ngIf="errorSummary.length > 0"
  class="notice"
  nzType="error"
  [nzMessage]="errorSummary.join(' · ')"
  nzShowIcon></nz-alert>

<form nz-form nzLayout="vertical" (ngSubmit)="submit()">
  <nz-form-item *ngIf="editing">
    <nz-form-label>Category code</nz-form-label>
    <nz-form-control>
      <input nz-input name="categoryCode" [ngModel]="assignedCode" disabled>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzRequired>Name</nz-form-label>
    <nz-form-control [nzErrorTip]="fieldError('Name')">
      <input nz-input name="categoryName" [(ngModel)]="model.name" required>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label>Description</nz-form-label>
    <nz-form-control>
      <textarea nz-input name="categoryDescription" rows="3" [(ngModel)]="model.description"></textarea>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label>Parent Category</nz-form-label>
    <nz-form-control>
      <nz-tree-select
        name="parentCategoryId"
        [(ngModel)]="model.parentCategoryId"
        [nzNodes]="parentOptions"
        nzPlaceHolder="No parent"
        nzShowSearch
        nzAllowClear>
      </nz-tree-select>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzRequired>Sort Order</nz-form-label>
    <nz-form-control>
      <nz-input-number name="sortOrder" [(ngModel)]="model.sortOrder" [nzMin]="0"></nz-input-number>
    </nz-form-control>
  </nz-form-item>

  <app-dropdown
    label="Status"
    name="categoryStatus"
    [(ngModel)]="model.status"
    [options]="statusOptions"
    [disabled]="!editing">
  </app-dropdown>

  <div class="form-actions">
    <button nz-button nzType="primary" type="submit" [nzLoading]="saving" [disabled]="saving">
      {{ editing ? 'Save Changes' : 'Create Category' }}
    </button>
    <button nz-button type="button" (click)="cancel.emit()" [disabled]="saving">Cancel</button>
  </div>
</form>
