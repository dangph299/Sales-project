<section class="page-header">
  <div>
    <p class="eyebrow">Catalog</p>
    <h1>Categories</h1>
    <p>Organize products with a clear parent-child category hierarchy.</p>
  </div>
</section>

<nz-alert
  *ngIf="treeDiagnostics().length > 0"
  class="notice"
  nzType="warning"
  nzShowIcon
  nzMessage="Hierarchy diagnostics"
  [nzDescription]="treeDiagnostics().join(' ')">
</nz-alert>

<nz-card nzTitle="Category Hierarchy">
  <div class="category-toolbar">
    <div class="toolbar-search">
      <label>
        Search
        <input
          nz-input
          name="categorySearch"
          [ngModel]="searchText()"
          (ngModelChange)="changeSearchText($event)"
          placeholder="Name, code, or parent category">
      </label>
    </div>

    <div class="toolbar-filters">
      <app-dropdown
        class="filter-field"
        label="Status"
        name="categoryStatusFilter"
        presentation="toolbar"
        [ngModel]="statusFilter()"
        [options]="statusOptions"
        (ngModelChange)="changeStatusFilter($event)">
      </app-dropdown>
    </div>

    <div class="toolbar-actions">
      <button nz-button type="button" (click)="resetFilters()">Reset</button>
      <button nz-button type="button" (click)="expandAll()">Expand All</button>
      <button nz-button type="button" (click)="collapseAll()">Collapse All</button>
      <button nz-button nzType="primary" type="button" (click)="openCreateCategory()">Add Category</button>
    </div>
  </div>

  <app-data-table
    class="category-state"
    [showCard]="false"
    tableRole="treegrid"
    size="middle"
    scrollX="1250px"
    [columns]="tableColumns"
    [rows]="pagedVisibleRows()"
    [rowKey]="rowIdentity"
    [rowClass]="rowClass"
    [rowAriaLevel]="rowAriaLevel"
    [rowAriaExpanded]="rowAriaExpanded"
    [loading]="loading()"
    [errorMessage]="errorMessage()"
    [empty]="visibleRows().length === 0"
    [total]="visibleRowTotal()"
    [pageIndex]="effectivePageIndex()"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    [showPagination]="true"
    emptyTitle="No categories found"
    emptyText="Create your first category to start organizing the product catalog."
    (retry)="loadCategories()"
    (pageChanged)="changeTablePage($event)">
    <ng-template appTableCell="category" let-node>
          <div class="tree-cell" [style.--tree-level]="node.level">
            <span class="tree-indent"></span>
            <button
              *ngIf="node.hasChildren"
              class="tree-toggle"
              nz-button
              nzType="text"
              nzSize="small"
              type="button"
              [attr.aria-label]="node.isExpanded ? 'Collapse ' + node.name : 'Expand ' + node.name"
              (click)="$event.stopPropagation(); toggleCategory(node.id)">
              <span nz-icon [nzType]="node.isExpanded ? 'down' : 'right'"></span>
            </button>
            <span *ngIf="!node.hasChildren" class="tree-toggle-placeholder"></span>
            <span class="cell-ellipsis category-name" [nzTooltipTitle]="node.path" nz-tooltip>
              {{ node.name }}
            </span>
            <nz-tag *ngIf="node.isInvalid" nzColor="warning">{{ node.invalidReason }}</nz-tag>
          </div>
    </ng-template>
    <ng-template appTableCell="code" let-node>
      <span class="cell-ellipsis mono" [nzTooltipTitle]="node.code" nz-tooltip>{{ node.code }}</span>
    </ng-template>
    <ng-template appTableCell="parentCategoryName" let-node>
      <span class="cell-ellipsis" [nzTooltipTitle]="node.parentCategoryName || 'Root'" nz-tooltip>
        {{ node.parentCategoryName || 'Root' }}
      </span>
    </ng-template>
    <ng-template appTableCell="status" let-node>
      <app-status-tag [display]="statusDisplay(node.status)"></app-status-tag>
    </ng-template>
    <ng-template appTableCell="actions" let-node>
          <div class="row-actions">
            <button
              nz-button
              nzSize="small"
              type="button"
              [attr.aria-label]="'Edit category ' + node.name"
              (click)="openEditCategory(node.source)">
              Edit
            </button>
            <button
              nz-button
              nzDanger
              nzSize="small"
              type="button"
              [attr.aria-label]="'Delete category ' + node.name"
              (click)="deleteCategory(node.source)">
              Delete
            </button>
          </div>
    </ng-template>
  </app-data-table>
</nz-card>

<nz-modal
  [nzVisible]="categoryModalOpen()"
  [nzTitle]="modalTitle()"
  [nzFooter]="null"
  [nzWidth]="640"
  [nzBodyStyle]="{ 'max-height': 'calc(100vh - 220px)', 'overflow-y': 'auto' }"
  (nzAfterOpen)="triggerCategoryCreateFocus()"
  (nzOnCancel)="closeCategoryModal()">
  <ng-container *nzModalContent>
    <app-category-form
      [appFocusFirstRequired]="!selectedCategory()"
      [focusFirstRequiredTrigger]="categoryCreateFocusTrigger()"
      [model]="categoryForm"
      [parentOptions]="parentOptions()"
      [validationErrors]="validationErrors()"
      [errorMessage]="mutationErrorMessage()"
      [saving]="saving()"
      [editing]="!!selectedCategory()"
      [assignedCode]="selectedCategory()?.categoryCode || ''"
      (save)="saveCategory($event)"
      (cancel)="closeCategoryModal()"></app-category-form>
  </ng-container>
</nz-modal>
