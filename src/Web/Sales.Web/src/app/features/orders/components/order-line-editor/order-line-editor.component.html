<app-data-table
  class="order-lines-table"
  [showCard]="false"
  [columns]="tableColumns"
  [rows]="lines"
  [rowKey]="rowIdentity"
  [total]="lines.length"
  [empty]="lines.length === 0"
  emptyTitle="The cart is empty"
  emptyText="Select a Normal customer and orderable product variants to create an order."
  scrollX="860px">
  <ng-template appTableCell="quantity" let-line>
    <nz-input-number
      class="line-number-input"
      [ngModel]="line.quantity"
      (ngModelChange)="changeQuantity(line.variant.id, $event)"
      [nzDisabled]="readonly || saving"
      [nzMin]="1"
      nzSize="small"></nz-input-number>
  </ng-template>
  <ng-template appTableCell="discountPercent" let-line>
    <nz-input-number
      class="line-number-input"
      [ngModel]="line.discountPercent"
      (ngModelChange)="changeDiscount(line.variant.id, $event)"
      [nzDisabled]="readonly || saving"
      [nzMin]="0"
      [nzMax]="100"
      nzSize="small"></nz-input-number>
  </ng-template>
  <ng-template appTableCell="lineTotal" let-line>
    <span class="line-total">{{ lineTotal(line) | money }}</span>
  </ng-template>
  <ng-template appTableCell="actions" let-line>
    <button
      *ngIf="!readonly"
      nz-button
      nzDanger
      nzSize="small"
      type="button"
      (click)="removeLine(line.variant.id)"
      [disabled]="saving">
      Delete
    </button>
  </ng-template>
</app-data-table>

<section class="summary-strip" *ngIf="showSummary && lines.length > 0">
  <span>Subtotal: {{ subtotal | money }}</span>
  <strong>Grand total: {{ grandTotal | money }}</strong>
  <button
    *ngIf="showFooterAction"
    nz-button
    nzType="primary"
    type="button"
    (click)="createOrder.emit()"
    [nzLoading]="saving"
    [disabled]="readonly || saving || !canCreateOrder || lines.length === 0">
    {{ actionLabel }}
  </button>
</section>
