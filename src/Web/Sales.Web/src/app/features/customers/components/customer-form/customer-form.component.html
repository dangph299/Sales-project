<form nz-form nzLayout="vertical" (ngSubmit)="save.emit()">
  <app-form-field label="Name" [required]="true" [error]="fieldError('Name')">
    <input nz-input name="customerName" [(ngModel)]="model.name" required>
  </app-form-field>

  <app-form-field label="Phone" [required]="true" [error]="fieldError('Phone')">
    <input nz-input name="customerPhone" [(ngModel)]="model.phone" required>
  </app-form-field>

  <app-form-field label="Email" [error]="fieldError('Email')">
    <input nz-input name="customerEmail" type="email" [(ngModel)]="model.email">
  </app-form-field>

  <app-form-field label="Address" [error]="fieldError('Address')">
    <textarea nz-input name="customerAddress" rows="3" [(ngModel)]="model.address"></textarea>
  </app-form-field>

  <button type="submit" hidden aria-hidden="true"></button>
</form>
