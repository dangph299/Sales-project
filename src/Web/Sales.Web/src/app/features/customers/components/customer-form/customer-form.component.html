<nz-alert *ngIf="errorMessage" class="notice" nzType="error" [nzMessage]="errorMessage" nzShowIcon></nz-alert>
<nz-alert
  *ngIf="errorSummary.length > 0"
  class="notice"
  nzType="error"
  [nzMessage]="errorSummary.join(' · ')"
  nzShowIcon></nz-alert>

<form nz-form nzLayout="vertical" (ngSubmit)="save.emit()">
  <nz-form-item>
    <nz-form-label nzRequired>Name</nz-form-label>
    <nz-form-control [nzErrorTip]="fieldError('Name')">
      <input nz-input name="customerName" [(ngModel)]="model.name" required>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzRequired>Phone</nz-form-label>
    <nz-form-control [nzErrorTip]="fieldError('Phone')">
      <input nz-input name="customerPhone" [(ngModel)]="model.phone" required>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label>Email</nz-form-label>
    <nz-form-control [nzErrorTip]="fieldError('Email')">
      <input nz-input name="customerEmail" type="email" [(ngModel)]="model.email">
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label>Address</nz-form-label>
    <nz-form-control [nzErrorTip]="fieldError('Address')">
      <textarea nz-input name="customerAddress" rows="3" [(ngModel)]="model.address"></textarea>
    </nz-form-control>
  </nz-form-item>

  <div class="form-actions">
    <button nz-button nzType="primary" type="submit" [nzLoading]="saving">
      {{ editing ? 'Save changes' : 'Create customer' }}
    </button>
    <button nz-button type="button" (click)="cancel.emit()">Cancel</button>
  </div>
</form>
