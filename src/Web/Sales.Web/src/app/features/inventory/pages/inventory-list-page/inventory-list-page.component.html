<section class="page-header">
  <div>
    <p class="eyebrow">Inventory</p>
    <h1>Stock Overview</h1>
    <p>Inventory is managed by ProductVariantId and SKU, not by the shared ProductId.</p>
  </div>
  <button nz-button type="button" (click)="loadStockRows()">Refresh stock</button>
</section>

<section class="toolbar">
  <label> SKU
    <input nz-input name="inventorySku" [(ngModel)]="skuFilter" (keyup.enter)="search()" placeholder="Search by SKU">
  </label>
  <label> Product name
    <input nz-input name="inventoryProductName" [(ngModel)]="nameFilter" (keyup.enter)="search()" placeholder="Search by product name">
  </label>
  <app-dropdown
    class="filter-field"
    label="Stock state (this page)"
    name="stockState"
    presentation="toolbar"
    controlWidth="150px"
    [(ngModel)]="stockStateFilter"
    [options]="stockStateOptions">
  </app-dropdown>
  <button nz-button nzType="primary" type="button" (click)="search()">Search</button>
</section>

<app-data-table
  title="Stock Overview"
  recordLabel="variants"
  [columns]="tableColumns"
  [rows]="filteredRows()"
  [loading]="loading()"
  [errorMessage]="errorMessage()"
  [empty]="stockRows().length === 0"
  emptyTitle="No variants found"
  emptyText="Adjust the filters, or add variants to a product to track their stock."
  [total]="total()"
  [pageIndex]="pageIndex"
  [pageSize]="pageSize"
  [pageSizeOptions]="pageSizeOptions"
  [showPagination]="true"
  [sort]="tableSort()"
  [clickableRows]="true"
  [selectedRowKey]="selectedRow()?.variant?.id || ''"
  scrollX="1080px"
  cardClass="wide"
  [cardExtraText]="'Low threshold: ' + lowStockThreshold"
  [showTableWhenEmpty]="stockRows().length > 0"
  [rowKey]="rowIdentity"
  (retry)="loadStockRows()"
  (pageChanged)="changeTablePage($event)"
  (sortChanged)="changeTableSort($event)"
  (rowClicked)="selectRow($event)">
  <ng-template appTableCell="status" let-row>
    <app-status-tag [display]="statusDisplay(row.variant.status)"></app-status-tag>
  </ng-template>
  <ng-template appTableCell="total" let-row>
    {{ totalQuantity(row) }}
  </ng-template>
  <ng-template appTableCell="state" let-row>
    <span class="stock-chip" [class]="stockState(row)">{{ stockStateText(row) }}</span>
  </ng-template>
  <ng-template appTableCell="actions" let-row>
    <button nz-button nzSize="small" type="button" (click)="$event.stopPropagation(); openAdjustment(row)">
      Adjust
    </button>
  </ng-template>
</app-data-table>

<nz-modal
  [nzVisible]="adjustmentModalOpen()"
  nzTitle="Receive / Adjust Stock"
  [nzFooter]="null"
  [nzWidth]="560"
  [nzBodyStyle]="{ 'max-height': 'calc(100vh - 220px)', 'overflow-y': 'auto' }"
  (nzOnCancel)="closeAdjustment()">
  <ng-container *nzModalContent>
    <app-stock-adjustment-form
      *ngIf="selectedRow() as row"
      [row]="row"
      [model]="adjustmentForm"
      [saving]="saving()"
      [errorMessage]="mutationErrorMessage()"
      (apply)="adjustInventory()"></app-stock-adjustment-form>
  </ng-container>
</nz-modal>
