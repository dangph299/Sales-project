<form nz-form nzLayout="vertical" (ngSubmit)="submit()">
  <nz-form-item *ngIf="editing">
    <nz-form-label>Product code</nz-form-label>
    <nz-form-control>
      <input nz-input name="productCode" [ngModel]="assignedCode" disabled>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzRequired>Name</nz-form-label>
    <nz-form-control>
      <input nz-input name="productName" [(ngModel)]="model.name" required>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label>Description</nz-form-label>
    <nz-form-control>
      <textarea nz-input name="productDescription" rows="3" [(ngModel)]="model.description"></textarea>
    </nz-form-control>
  </nz-form-item>

  <app-dropdown
    label="Category"
    name="productCategoryId"
    [(ngModel)]="model.categoryId"
    [options]="categoryOptions()"
    [required]="true"
    [searchable]="true"
    placeholder="Select a category">
  </app-dropdown>

  <div class="form-actions">
    <button nz-button nzType="primary" type="submit" [nzLoading]="saving" [disabled]="saving">
      {{ editing ? 'Save product' : 'Create product' }}
    </button>
    <button nz-button type="button" (click)="cancel.emit()" [disabled]="saving">Cancel</button>
  </div>
</form>
