<form nz-form nzLayout="vertical" (ngSubmit)="save.emit()">
  <nz-alert
    *ngIf="errorMessage"
    class="notice"
    nzType="error"
    nzShowIcon
    [nzMessage]="errorMessage"></nz-alert>

  <div class="field-grid">
    <app-dropdown
      label="Color"
      name="variantColor"
      [(ngModel)]="model.colorId"
      [options]="colorOptions()"
      [required]="true"
      placeholder="Select a color">
      <ng-template appDropdownOption let-option>
        <span class="swatch" [style.background]="colorById(option.value)?.hexCode || 'transparent'"></span>
        <span class="option-code">{{ colorById(option.value)?.code }}</span>
        <span class="option-name">{{ colorById(option.value)?.name }}</span>
      </ng-template>
    </app-dropdown>

    <app-dropdown
      label="Size"
      name="variantSize"
      [(ngModel)]="model.sizeId"
      [options]="sizeOptions()"
      [required]="true"
      placeholder="Select a size">
      <ng-template appDropdownOption let-option>
        <span class="option-code">{{ sizeById(option.value)?.code }}</span>
        <span class="option-name">{{ sizeById(option.value)?.name }}</span>
      </ng-template>
    </app-dropdown>

    <nz-form-item>
      <nz-form-label nzRequired>Price</nz-form-label>
      <nz-form-control>
        <nz-input-number
          class="price-input"
          data-focus-required="true"
          name="variantPrice"
          [(ngModel)]="model.price"
          [nzMin]="0"
          [nzStep]="1000"
          [nzFormatter]="formatPrice"
          [nzParser]="parsePrice"></nz-input-number>
      </nz-form-control>
    </nz-form-item>

    <app-dropdown
      label="Status"
      name="variantStatus"
      [(ngModel)]="model.status"
      [options]="statusSelectOptions">
    </app-dropdown>
  </div>

  <div class="sku-preview">
    <span class="sku-preview__swatch" [style.background]="selectedColorHex"></span>
    <div class="sku-preview__text">
      <span class="sku-preview__label">Generated SKU</span>
      <span class="sku-preview__value">{{ skuPreview }}</span>
    </div>
  </div>

  <div class="form-actions">
    <button nz-button type="button" (click)="cancel.emit()" [disabled]="saving">Cancel</button>
    <button nz-button nzType="primary" type="submit" [nzLoading]="saving" [disabled]="disabled || saving">
      {{ editing ? 'Save variant' : 'Add variant' }}
    </button>
  </div>
</form>
