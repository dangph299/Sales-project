<section class="page-header">
  <div>
    <p class="eyebrow">Catalog</p>
    <h1>Attribute</h1>
    <p>Attribute lookup data is read-only and loaded from the Sales API. Codes are the stable business identifiers.</p>
  </div>
</section>

<app-page-state
  [loading]="loading()"
  [errorMessage]="errorMessage()"
  [empty]="colors().length === 0 && sizes().length === 0"
  emptyTitle="No Attribute data"
  emptyText="The Sales API returned no colors or sizes."
  (retry)="reload()"></app-page-state>

<section class="content-grid" *ngIf="!loading() && !errorMessage()">
  <nz-card nzTitle="Color List" [nzExtra]="colorCount">
    <ng-template #colorCount></ng-template>

    <app-data-table
      [showCard]="false"
      [columns]="colorColumns"
      [rows]="colors()"
      [total]="colors().length"
      [empty]="colors().length === 0"
      emptyTitle="No colors"
      emptyText="The Sales API returned no colors.">
      <ng-template appTableCell="preview" let-color>
        <span class="color-swatch" [style.background]="color.hexCode || '#ffffff'"></span>
      </ng-template>
    </app-data-table>
  </nz-card>

  <nz-card nzTitle="Size List" [nzExtra]="sizeNote">
    <ng-template #sizeNote></ng-template>

    <app-data-table
      [showCard]="false"
      [columns]="sizeColumns"
      [rows]="sizes()"
      [total]="sizes().length"
      [empty]="sizes().length === 0"
      emptyTitle="No sizes"
      emptyText="The Sales API returned no sizes.">
    </app-data-table>
  </nz-card>
</section>
