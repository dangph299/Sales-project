name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Sales.sln

      - name: Build
        run: dotnet build Sales.sln --no-restore --verbosity:minimal

      - name: Test
        run: dotnet test Sales.sln --no-build --no-restore --verbosity:minimal

      - name: Validate Docker Compose
        run: docker compose -f docker/docker-compose.yml config
